server:
  port: 8082
spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  application:
    name: hxlife
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/redis_learning?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

  redis:
    host: 192.168.83.139
    port: 6379
    password: 123456
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  rabbitmq:
    host: 192.168.83.139 # 你的虚拟机IP
    port: 5672 # 端口
    virtual-host: /hxlife # 虚拟主机
    username: wumm # 用户名
    password: 123456 # 密码
    listener:
      simple:
        prefetch: 1 # 每次只抓取一条消息，防止消费者被撑爆
        acknowledge-mode: auto # 建议开启手动确认，保证消息不丢失




  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.whx.entity # 别名扫描包
  global-config:
    db-config:
      insert-strategy: not_null
      update-strategy: not_null

logging:
  level:
    com.whx: debug

knife4j:
  enable: true
  openapi:
    # 核心：在 OpenAPI 3 下，Knife4j 4.x 建议明确指定模式
    mode: openapi3
    title: 芸享生活接口文档
    group:
      default:
        group-name: 默认分组
        api-rule: package
        api-rule-resources:
          - com.whx.controller # 再次确认这是你的真实包路径

aliyun:
 oss:
   accessKeyId: ${OSS_ACCESS_KEY_ID}
   accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
   bucketName: my-web01
   endpoint: oss-cn-beijing.aliyuncs.com
   region: cn-beijing
   host: https://my-web01.oss-cn-beijing.aliyuncs.com


